# Personal details
title: Alina Aleks
email: toalinaaleks@gmail.com
description: >-
  "Проекты и мысли, связанные с данными и кодом"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://alinaaleks.github.io"
github_username: alinaaleks

# Plugins
plugins:
  - jekyll-bookshop
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# Multiple bookshops can be used on one website,
# or different production / staging locations.
bookshop_locations:
  - component-library

exclude:
  - postcss.config.js
  - node_modules

include:
  - _redirects
#  - _cloudcannon

# Collections
collections_dir: "collections"

collections:
  pages:
    output: true
  projects:
    output: true
  testimonials:
    output: false
  posts:
    output: true

# Default layout for content
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: pages
      path: _pages/index.html
    values:
      permalink: /
  - scope:
      type: projects
    values:
      layout: project
  - scope:
      type: posts
    values:
      layout: post

# SEO settings (optional)
tag_page_dir: tag
tag_page_layout: tag_page

# New section for project tags
tag_project_page_dir: pj-tag
tag_project_page_layout: tag_project

# Languages
languages: ["ru", "en"]
default_lang: "ru"

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
