<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="4f2cAYIx14_YJpzrbF_Bjx0AXuGCIGTdasmKgzIxqZM" />

  <title>
{% if page.title %}
  {{ page.title }}
{% else %}
  {{ site.data.general_settings.title }}
{% endif %}
</title>
<meta name="description"
content="{% if page.subtitle %}
{{ page.subtitle | strip_html | strip_newlines | truncate: 160 }}
{% elsif page.description %}
{{ page.description | strip_html | strip_newlines | truncate: 160 }}
{% else %}
{{ site.data.general_settings.description }}
{% endif %}">

  <!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.data.general_settings.title }}{% endif %}" />

<meta property="og:description"
content="{% if page.subtitle %}
{{ page.subtitle | strip_html | strip_newlines | truncate: 160 }}
{% elsif page.description %}
{{ page.description | strip_html | strip_newlines | truncate: 160 }}
{% else %}
{{ site.data.general_settings.description }}
{% endif %}">

<meta property="og:url"
content="{{ page.url | replace:'index.html','' | absolute_url }}">

<meta property="og:image"
content="{% if page.image %}
{{ page.image | absolute_url }}
{% else %}
{{ site.data.general_settings.default_image | absolute_url }}
{% endif %}">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

  <!-- Favicon -->
 <link rel="icon" href="{{ '/assets/main/favicon.png' | relative_url }}" type="image/png">

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/main/apple-touch-icon.png' | relative_url }}">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="alinaaleks">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<!-- Ionicons -->
<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <link rel="stylesheet" href="/assets/css/main.css">
</head>
