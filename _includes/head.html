<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="4f2cAYIx14_YJpzrbF_Bjx0AXuGCIGTdasmKgzIxqZM" />

  <title>{% if page.url == "/" %}{{ site.data.general_settings.title }}{% elsif page.title %}{{ page.title }}{% else %}{{ site.data.general_settings.title }}{% endif %}</title>
  <meta name='description' content='{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.data.general_settings.description }}{% endif %}'>

 <link rel="icon" href="{{ '/assets/main/favicon.png' | relative_url }}" type="image/png">

  <meta name="mobile-web-app-capable" content="yes">
