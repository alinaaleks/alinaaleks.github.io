{% assign current_ref = page.ref %}
{% assign current_lang = page.lang | default: site.default_lang %}

{% for p in site.pages %}
  {% if p.ref == current_ref and p.lang != current_lang %}
    <a class="lang-switch" href="{{ p.url }}">
      {% if current_lang == "en" %}
        RU
      {% else %}
        EN
      {% endif %}
    </a>
  {% endif %}
{% endfor %}
