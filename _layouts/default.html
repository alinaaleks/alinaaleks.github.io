<!DOCTYPE html>
<html lang="ru">

{% include head.html %}

{% if site.data.general_settings.google-analytics %}
    {% include google-analytics.html %}
{% endif %}

<body>

    {% include header.html %}

    {{ content }}

    <!--
        Bookshop components are accessed using the bookshop tag,
        using the same syntax as the standard Jekyll include tag.
    -->
    {% bookshop_include page content_blocks=page.content_blocks page_theme=page.page_theme %}

    <div class="top" title="Top"><ion-icon name="arrow-up"></ion-icon></div>

    {% include footer.html %}

    <script src="/assets/js/scripts.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="{{ '/assets/js/timeline.js' | relative_url }}"></script>
</body>
</html>
